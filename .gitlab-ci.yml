# Define stages for the pipeline
stages:
  - install
  - lint
  - test
  - freeze
  - security
  - docs

# Job to install dependencies
install:
  stage: install
  image: python:3.9 # Use an appropriate Python image
  script:
    - pip install -r requirements.txt
  cache:
    paths:
      - .venv/ # Cache virtual environment if using one

# Job to run linting (code style checks)
lint:
  stage: lint
  image: python:3.9
  script:
    - pip install flake8
    - flake8 src/ tests/ # Adjust paths to your source and test directories

# Job to run unit tests
test:
  stage: test
  image: python:3.9
  script:
    - python -m unittest discover -s tests -p "*.py" # Discover and run all unittests in the tests directory
  coverage: '/^TOTAL\s+\d+\s+\d+\s+(\d+%)/' # Adjust regex based on coverage report format

# Job to freeze the environment
freeze:
  stage: freeze
  image: python:3.9
  script:
    - pip freeze > requirements_freeze.txt
  artifacts:
    paths:
      - requirements_freeze.txt

# Job to build documentation with Sphinx (if applicable)
docs:
  stage: docs
  image: python:3.9
  script:
    - pip install sphinx
    - sphinx-build -b html docs/ docs/_build/
  artifacts:
    paths:
      - docs/_build/

# Static Application Security Testing (SAST)
sast:
  stage: security
  image: python:3.9
  include:
    - template: Security/SAST.gitlab-ci.yml

# Dependency Scanning
dependency_scanning:
  stage: security
  image: python:3.9
  include:
    - template: Security/Dependency-Scanning.gitlab-ci.yml

# Secret Detection
secret_detection:
  stage: security
  image: python:3.9
  include:
    - template: Security/Secret-Detection.gitlab-ci.yml
